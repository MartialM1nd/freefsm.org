<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeFSM — Free Field Service Manager</title>
  <meta name="description" content="Self-hosted, open-source field service management for FreeBSD and Linux. Single static Go binary, PostgreSQL backend, zero npm dependencies.">
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner container">
      <a href="/" class="logo">
        <img class="logo-icon" src="/assets/images/apple-touch-icon.png" alt="">
        <span class="logo-text">FreeFSM</span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/features.html">Features</a>
        <a href="/docs/">Docs</a>
        <a href="https://github.com/MartialM1nd/freefsm" class="nav-cta">GitHub</a>
      </div>
      <button class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    {{content}}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p>FreeFSM — Free Field Service Manager</p>
        <p class="footer-muted">AGPL-3.0 Licensed</p>
      </div>
      <div class="footer-right">
        <a href="https://github.com/MartialM1nd/freefsm">GitHub</a>
        <a href="/docs/">Documentation</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
